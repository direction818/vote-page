<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强制双休制度调查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .question {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        
        .question-text {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }
        
        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option-btn {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .option-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .option-btn.voted {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .option-btn.agree {
            border-color: #4CAF50;
            background: #f1f8f4;
        }
        
        .option-btn.disagree {
            border-color: #f44336;
            background: #fef5f5;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 500;
        }
        
        .icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .agree .icon {
            background: #4CAF50;
            color: white;
        }
        
        .disagree .icon {
            background: #f44336;
            color: white;
        }
        
        .vote-count {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .progress-section {
            margin-top: 30px;
        }
        
        .stat-row {
            margin-bottom: 20px;
        }
        
        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
            position: relative;
        }
        
        .progress-fill.agree {
            background: linear-gradient(90deg, #4CAF50, #81C784);
        }
        
        .progress-fill.disagree {
            background: linear-gradient(90deg, #f44336, #ef5350);
        }
        
        .percentage {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        .total-votes {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 14px;
        }
        
        .total-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-top: 5px;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .real-time-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e8f5e9;
            color: #4CAF50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .voted-message {
            text-align: center;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            color: #1976d2;
            margin-top: 20px;
            display: none;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 强制双休制度调查</h1>
        <p class="subtitle">实时统计 · 匿名投票 · 即时显示结果</p>
        
        <div class="question">
            <p class="question-text">
                <strong>您是否同意在全国强制实施双休制度（每周工作5天，休息2天）？</strong>
            </p>
        </div>
        
        <div class="options">
            <button class="option-btn agree" onclick="vote('agree')">
                <span class="option-label">
                    <span class="icon">✓</span>
                    同意实施
                </span>
                <span class="vote-count" id="agree-count">0</span>
            </button>
            
            <button class="option-btn disagree" onclick="vote('disagree')">
                <span class="option-label">
                    <span class="icon">✕</span>
                    不同意
                </span>
                <span class="vote-count" id="disagree-count">0</span>
            </button>
        </div>
        
        <div class="progress-section">
            <div class="stat-row">
                <div class="stat-label">
                    <span>👍 同意比例 <span class="real-time-badge"><span class="dot"></span>实时</span></span>
                    <span id="agree-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill agree" id="agree-bar" style="width: 0%">
                        <span class="percentage" id="agree-bar-percent">0%</span>
                    </div>
                </div>
            </div>
            
            <div class="stat-row">
                <div class="stat-label">
                    <span>👎 不同意比例</span>
                    <span id="disagree-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill disagree" id="disagree-bar" style="width: 0%">
                        <span class="percentage" id="disagree-bar-percent">0%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="total-votes">
            总投票人数
            <span class="total-number pulse" id="total-count">0</span>
        </div>
        
        <div class="voted-message" id="voted-msg">
            ✅ 您已完成投票，结果已实时更新
        </div>
    </div>

    <script>
        // 初始化数据（实际应用中应从服务器获取）
        let votes = {
            agree: 0,
            disagree: 0
        };
        
        let hasVoted = false;
        
        // 模拟一些初始数据（演示用）
        function initDemoData() {
            votes.agree = 3428;
            votes.disagree = 856;
            updateDisplay();
        }
        
        // 投票功能
        function vote(type) {
            if (hasVoted) return;
            
            // 增加票数
            votes[type]++;
            
            // 标记已投票
            hasVoted = true;
            
            // 更新按钮状态
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.add('voted');
            });
            
            // 显示投票成功消息
            document.getElementById('voted-msg').style.display = 'block';
            
            // 更新显示
            updateDisplay();
            
            // 模拟实时同步（实际应用中使用WebSocket或轮询）
            simulateRealTimeUpdate(type);
        }
        
        // 更新显示
        function updateDisplay() {
            const total = votes.agree + votes.disagree;
            
            // 更新计数
            document.getElementById('agree-count').textContent = votes.agree.toLocaleString();
            document.getElementById('disagree-count').textContent = votes.disagree.toLocaleString();
            document.getElementById('total-count').textContent = total.toLocaleString();
            
            // 计算百分比
            const agreePercent = total > 0 ? (votes.agree / total * 100).toFixed(1) : 0;
            const disagreePercent = total > 0 ? (votes.disagree / total * 100).toFixed(1) : 0;
            
            // 更新百分比文本
            document.getElementById('agree-percent').textContent = agreePercent + '%';
            document.getElementById('disagree-percent').textContent = disagreePercent + '%';
            
            // 更新进度条
            document.getElementById('agree-bar').style.width = agreePercent + '%';
            document.getElementById('disagree-bar').style.width = disagreePercent + '%';
            
            // 更新进度条内百分比
            document.getElementById('agree-bar-percent').textContent = agreePercent + '%';
            document.getElementById('disagree-bar-percent').textContent = disagreePercent + '%';
        }
        
        // 模拟实时更新（演示其他用户投票）
        function simulateRealTimeUpdate(userVote) {
            // 模拟其他用户也在投票
            setInterval(() => {
                if (Math.random() > 0.5) {
                    votes.agree++;
                } else {
                    votes.disagree++;
                }
                updateDisplay();
            }, 3000 + Math.random() * 4000); // 每3-7秒随机增加一票
        }
        
        // 页面加载时初始化
        window.onload = function() {
            initDemoData();
        };
    </script>
</body>
</html>
